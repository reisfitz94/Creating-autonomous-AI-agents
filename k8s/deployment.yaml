apiVersion: apps/v1
kind: Deployment
metadata:
  name: market-ops
spec:
  replicas: 1
  selector:
    matchLabels:
      app: market-ops
  template:
    metadata:
      labels:
        app: market-ops
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: market-ops
          image: creating-autonomous-ai-agents:market-ops
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          ports:
            - containerPort: 8000
          env:
            - name: TWITTER_BEARER_TOKEN
              value: ""
            - name: USE_LLM
              value: "0"
            - name: MARKET_OPS_API_KEY
              value: ""
            - name: MARKET_OPS_DB_PATH
              value: "/app/data/market_ops.db"
            - name: SLACK_WEBHOOK_URL
              value: ""
            - name: SMTP_SERVER
              value: ""
            - name: SMTP_PORT
              value: ""
            - name: SMTP_USER
              value: ""
            - name: SMTP_PASSWORD
              value: ""
          volumeMounts:
            - name: data
              mountPath: /app/data
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: data
          hostPath:
            path: /var/lib/market_ops_data
            type: DirectoryOrCreate
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: market-ops
spec:
  selector:
    app: market-ops
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
  type: ClusterIP
