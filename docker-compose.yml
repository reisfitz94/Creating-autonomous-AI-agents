version: '3.8'

services:
  market_ops:
    build: .
    image: creating-autonomous-ai-agents:market-ops
    ports:
      - "8000:8000"
    environment:
      # configure as needed or reference .env file
      - TWITTER_BEARER_TOKEN=
      - USE_LLM=0
      - MARKET_OPS_API_KEY=
      - MARKET_OPS_DB_PATH=/app/data/market_ops.db
      - SLACK_WEBHOOK_URL=
      - SMTP_SERVER=
      - SMTP_PORT=
      - SMTP_USER=
      - SMTP_PASSWORD=
    volumes:
      - ./market_ops_data:/app/data   # optional persistent storage
    restart: unless-stopped
    command: []  # allow override of default ENTRYPOINT if needed
